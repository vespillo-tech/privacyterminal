boot_messages:
  - type: BOOT
    text: "Privacy Terminal v0.1.0"
  - type: INFO
    text: "No tracking · No cookies · No external requests"
  - type: READY
    text: "All tools run client-side. Your data never leaves your browser."
promises:
  - icon: "⊘"
    title: ZERO TRACKING
    color: green
    description: "No analytics. No fingerprinting. No cookies. Open your DevTools Network tab — silence."
  - icon: "⊚"
    title: CLIENT-SIDE
    color: cyan
    description: "Every computation happens in your browser. Your data never touches a server."
  - icon: "⊡"
    title: OPEN SOURCE
    color: amber
    description: "Every line of code is public on GitHub. Don't trust — verify."
social_proof: "Used by privacy researchers, journalists, and security professionals. Recommended on r/privacy."
