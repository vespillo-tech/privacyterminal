verification_steps:
  - "Open DevTools → Network tab while using any tool. Zero external requests."
  - "Inspect the source code. No obfuscation."
  - "Check CSP headers — external scripts/connections blocked by default."
  - "Use uBlock Origin or NoScript to verify no hidden requests."
