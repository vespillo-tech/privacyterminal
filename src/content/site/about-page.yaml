what_is_this:
  - "Privacy Terminal is an open-source collection of browser-based privacy tools and educational guides. We help you understand your digital footprint and take practical steps to reduce it."
  - "Every tool runs entirely in your browser. Your data never touches our servers. Every guide presents the full landscape of options. Every line of code is publicly auditable."
  - "This site uses no analytics scripts, no cookies, and no tracking of any kind. We have zero visibility into individual visitor behavior. We don't know who you are, where you came from, or what you clicked. Verify this yourself — view source."
principles:
  - title: Privacy by Architecture
    description: "We don't ask you to trust us with your data. Tools run client-side. No server processing. No database. No logs. No analytics. No cookies."
  - title: Zero Telemetry
    description: "We use no analytics scripts — not even 'privacy-friendly' ones. The only metrics we see are Cloudflare's built-in aggregate dashboard (total requests, bandwidth). We cannot identify individual visitors."
  - title: The Landscape Principle
    description: "Every guide shows the full spectrum of options with honest trade-offs. We don't prescribe — we inform."
  - title: "Verify, Don't Trust"
    description: "Source code is public. Tools run in your browser where you can inspect them. We cite our sources. Open DevTools and check."
  - title: Education Over Products
    description: "Understanding why something matters is more durable than knowing which app to install."
