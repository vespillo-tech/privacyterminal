what_is_this:
  - "Privacy Terminal is an open-source collection of browser-based privacy tools and educational guides. We help you understand your digital footprint and take practical steps to reduce it."
  - "Every tool runs entirely in your browser. Your data never touches our servers. Every guide presents the full landscape of options. Every line of code is publicly auditable."
principles:
  - title: Privacy by Architecture
    description: "We don't ask you to trust us with your data. Tools run client-side. No server processing. No database. No logs."
  - title: The Landscape Principle
    description: "Every guide shows the full spectrum of options with honest trade-offs. We don't prescribe — we inform."
  - title: "Verify, Don't Trust"
    description: "Source code is public. Tools run in your browser where you can inspect them. We cite our sources."
  - title: Education Over Products
    description: "Understanding why something matters is more durable than knowing which app to install."
