verification_steps:
  - "Open DevTools → Network tab while browsing. Zero analytics requests."
  - "Check Application → Cookies tab. Zero cookies set by this site."
  - "Inspect the source code on GitHub. No obfuscation, no hidden scripts."
  - "Check the CSP headers — external scripts/connections blocked by default."
  - "Use uBlock Origin or NoScript to verify no hidden requests."
  - "Read our privacy policy at /privacy for the full statement."
