register:
  title: "SAVE YOUR PROGRESS"
  subtitle_lines:
    - "Your privacy score, guides, and achievements"
    - "will be saved anonymously."
  promise: "No email. No password. No personal data."
  create_button: "[+] Create Recovery Code"
  switch_to_login: "Already have a code? [Log in →]"
recovery:
  title: YOUR RECOVERY CODE
  warning: "Write this down. It's the ONLY way to restore your progress on another device."
  storage_note: "We do not store this code — only a hash. If you lose it, your progress is gone."
  copy_button: "[=] Copy Code"
  saved_button: "[v] I've Saved It"
login:
  title: RESTORE PROGRESS
  input_placeholder: "WORD-WORD-WORD-0000"
  prompt: "Enter your recovery code:"
  submit_button: "[>] Restore Progress"
  switch_to_register: "Don't have one? [Create New →]"
  error_invalid: "Invalid recovery code. Check your spelling and try again."
  error_empty: "Please enter your recovery code."
loading_text: processing

passkey:
  register_title: REGISTER PASSKEY
  register_description: "Use your fingerprint, face, or security key for instant sign-in. No codes to remember."
  register_button: "[+] Register Passkey"
  login_title: SIGN IN WITH PASSKEY
  login_button: "[>] Use Passkey"
  login_description: "Touch your fingerprint sensor or security key."
  success: "Passkey registered successfully!"
  error_not_supported: "Your browser doesn't support passkeys."
  error_failed: "Passkey authentication failed. Try again or use your recovery code."
  switch_to_passkey: "Have a passkey? [Use Passkey →]"
  switch_to_code: "Prefer recovery code? [Use Code →]"
